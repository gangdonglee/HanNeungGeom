<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>한능검 문제풀이</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --ink: #1f2328;
      --sub: #6b7280;
      --line: #e5e7eb;
      --brand: #2563eb;
      --brand-soft: #eff6ff;
      --correct: #16a34a;
      --correct-soft: #f0fdf4;
      --wrong: #dc2626;
      --wrong-soft: #fef2f2;
      --source-bg: #f9fafb;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Malgun Gothic", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      -webkit-text-size-adjust: 100%;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    /* 상단 바 */
    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: var(--card);
      border-bottom: 1px solid var(--line);
      padding: 12px 16px 10px;
    }
    .topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .topbar h1 { font-size: 16px; margin: 0; font-weight: 700; cursor: pointer; }
    .topbar-actions { display: flex; gap: 6px; align-items: center; }
    .icon-btn {
      border: 1px solid var(--line); background: var(--card); color: var(--sub);
      border-radius: 8px; padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .icon-btn.active { border-color: var(--brand); color: var(--brand); background: var(--brand-soft); }
    .unit-select {
      font-size: 13px; border: 1px solid var(--line); border-radius: 8px;
      padding: 6px 8px; background: var(--card); color: var(--ink);
    }
    .progress-wrap { margin-top: 10px; display: flex; align-items: center; gap: 8px; }
    .progress-bar { flex: 1; height: 6px; background: var(--line); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: var(--brand); transition: width .25s ease; }
    .progress-text { font-size: 12px; color: var(--sub); white-space: nowrap; }

    /* 본문 */
    .content { flex: 1; padding: 16px; overflow-y: auto; }
    .meta-row { display: flex; gap: 6px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .tag { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 99px; background: var(--brand-soft); color: var(--brand); }
    .tag.gray { background: #f3f4f6; color: var(--sub); }
    .tag.warn { background: #fffbeb; color: #b45309; }

    .prompt { font-size: 16px; font-weight: 600; margin: 0 0 14px; }
    .source {
      background: var(--source-bg); border: 1px solid var(--line); border-left: 3px solid var(--brand);
      border-radius: 8px; padding: 12px 14px; font-size: 14px; font-weight: 400; color: #374151; margin-top: 10px;
    }
    .q-image { max-width: 100%; height: auto; border-radius: 8px; margin: 12px 0; border: 1px solid var(--line); cursor: zoom-in; }
    /* 이미지 확대 보기 (탭하면 큰 화면에서 스크롤하며 보기) */
    #imgOverlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.92); display: none; overflow: auto; -webkit-overflow-scrolling: touch; }
    #imgOverlay.show { display: block; }
    #imgOverlay img { display: block; margin: 16px auto; max-width: none; cursor: zoom-out; }
    #imgOverlay .ov-close {
      position: fixed; top: 10px; right: 12px; z-index: 201; color: #fff; font-size: 22px;
      background: rgba(0,0,0,.55); width: 40px; height: 40px; border-radius: 50%; border: none;
      line-height: 40px; text-align: center; cursor: pointer;
    }
    #imgOverlay .ov-hint { position: fixed; bottom: 14px; left: 0; right: 0; text-align: center; color: #ccc; font-size: 12px; }

    /* 보기 */
    .choices { list-style: none; padding: 0; margin: 6px 0 0; }
    .choice {
      display: flex; align-items: flex-start; gap: 10px; width: 100%; text-align: left;
      background: var(--card); border: 1.5px solid var(--line); border-radius: 12px;
      padding: 13px 14px; margin-bottom: 10px; font-size: 15px; color: var(--ink); cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .choice:active { background: #f9fafb; }
    .choice .num {
      flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--line);
      display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--sub); margin-top: 1px;
    }
    .choice.selected { border-color: var(--brand); background: var(--brand-soft); }
    .choice.selected .num { border-color: var(--brand); color: var(--brand); }
    .choice.correct { border-color: var(--correct); background: var(--correct-soft); }
    .choice.correct .num { border-color: var(--correct); background: var(--correct); color: #fff; }
    .choice.wrong { border-color: var(--wrong); background: var(--wrong-soft); }
    .choice.wrong .num { border-color: var(--wrong); background: var(--wrong); color: #fff; }
    .choice.locked { cursor: default; }

    /* 해설 */
    .explanation { margin-top: 16px; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; animation: slideIn .2s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .explanation-head { padding: 10px 14px; font-size: 13px; font-weight: 700; color: #fff; display: flex; justify-content: space-between; align-items: center; }
    .explanation-head.ok { background: var(--correct); }
    .explanation-head.no { background: var(--wrong); }
    .explanation-body { padding: 14px; font-size: 14px; color: #374151; background: var(--card); }
    .bookmark-btn { background: rgba(255,255,255,.2); border: none; color: #fff; border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; }

    /* 하단 버튼 */
    .footer {
      position: sticky; bottom: 0; padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: var(--card); border-top: 1px solid var(--line); display: flex; gap: 10px;
    }
    .btn { flex: 1; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .15s, background .15s; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-ghost { background: #f3f4f6; color: var(--ink); flex: 0 0 auto; padding-left: 20px; padding-right: 20px; }

    .empty { text-align: center; color: var(--sub); padding: 60px 20px; font-size: 14px; }

    /* 결과 화면 */
    .result { padding: 30px 20px; text-align: center; }
    .result .score-circle {
      width: 140px; height: 140px; margin: 10px auto 20px; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 8px solid var(--brand-soft);
    }
    .result .score-num { font-size: 40px; font-weight: 800; color: var(--brand); line-height: 1; }
    .result .score-total { font-size: 14px; color: var(--sub); margin-top: 4px; }
    .result h2 { font-size: 20px; margin: 0 0 6px; }
    .result .grade { font-size: 15px; color: var(--sub); margin-bottom: 24px; }
    .result-stats { display: flex; gap: 10px; margin-bottom: 24px; }
    .result-stats .stat { flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 8px; }
    .result-stats .stat .v { font-size: 22px; font-weight: 800; }
    .result-stats .stat .v.ok { color: var(--correct); }
    .result-stats .stat .v.no { color: var(--wrong); }
    .result-stats .stat .l { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .result-actions { display: flex; flex-direction: column; gap: 10px; }
    .result-actions .btn { flex: none; }
    .result .grade.big { font-size: 22px; font-weight: 800; color: var(--ink); }
    .result .grade.pass { color: var(--correct); }
    .result .grade.fail { color: var(--wrong); }

    /* 실전 모의고사 */
    .topbar-actions { flex-wrap: wrap; justify-content: flex-end; }
    .exam-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 10px 14px; margin-bottom: 12px;
    }
    .exam-timer { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--brand); }
    .exam-timer.warn { color: var(--wrong); animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: .5; } }
    .exam-sub { font-size: 12px; color: var(--sub); }
    .omr { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-bottom: 14px; }
    .omr button {
      font-size: 11px; padding: 6px 0; border: 1px solid var(--line); border-radius: 6px;
      background: var(--card); color: var(--sub); cursor: pointer; font-weight: 600;
    }
    .omr button.done { background: var(--brand-soft); border-color: var(--brand); color: var(--brand); }
    .omr button.cur { outline: 2px solid var(--brand); outline-offset: 1px; }
    .btn-danger { background: var(--wrong); color: #fff; flex: 0 0 auto; padding-left: 18px; padding-right: 18px; }
    .review-item { border-top: 8px solid var(--bg); padding-top: 16px; margin-top: 16px; }
    .review-item:first-child { border-top: none; margin-top: 0; padding-top: 0; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-row">
        <h1 id="homeBtn">한능검 문제풀이</h1>
        <div class="topbar-actions">
          <button id="examBtn" class="icon-btn" title="실전 모의고사">📝 모의고사</button>
          <button id="shuffleBtn" class="icon-btn" title="셔플">🔀</button>
          <button id="wrongBtn" class="icon-btn" title="오답노트">★ 오답</button>
          <button id="resetBtn" class="icon-btn" title="푼 기록 초기화">🔄 초기화</button>
          <select id="roundSelect" class="unit-select"></select>
          <select id="unitSelect" class="unit-select"></select>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <span id="progressText" class="progress-text">0 / 0</span>
      </div>
    </header>

    <main id="content" class="content"></main>

    <footer id="footer" class="footer">
      <button id="prevBtn" class="btn btn-ghost">이전</button>
      <button id="actionBtn" class="btn btn-primary">정답 확인</button>
      <button id="examSubmitBtn" class="btn btn-danger" style="display:none">제출</button>
    </footer>
  </div>

  <div id="imgOverlay">
    <button class="ov-close" aria-label="닫기">×</button>
    <img id="ovImg" src="" alt="자료 확대" />
    <div class="ov-hint">이미지를 상하좌우로 밀어 보세요 · 탭하면 닫힘</div>
  </div>

  <script src="questions.js"></script>
  <script>
    // ============================ 저장소 (localStorage) ============================
    const STORE_KEY = 'hanneung_v1';
    const IMG_VER = '5';   // 자료 이미지 캐시 무력화 (이미지 바꿀 때마다 숫자 올림)
    function loadStore() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
      catch { return {}; }
    }
    function saveStore() { localStorage.setItem(STORE_KEY, JSON.stringify(store)); }
    // store = { answers: {id:{selected,correct}}, bookmarks: {id:true}, last: {unit,idx,mode,order} }
    const store = loadStore();
    store.answers = store.answers || {};
    store.bookmarks = store.bookmarks || {};
    store.last = store.last || {};

    // ============================ 상태 ============================
    let mode = 'quiz';          // 'quiz' | 'wrong' | 'result'
    let unitCode = 'all';
    let roundCode = 'all';      // 'all' 또는 회차 번호
    let shuffled = false;
    let pool = [];              // 현재 풀이 대상 문제 배열 (순서 적용됨)
    let idx = 0;
    let selected = null;
    let checked = false;

    const $content = document.getElementById('content');
    const $footer = document.getElementById('footer');
    const $unitSelect = document.getElementById('unitSelect');
    const $roundSelect = document.getElementById('roundSelect');
    const $actionBtn = document.getElementById('actionBtn');
    const $prevBtn = document.getElementById('prevBtn');
    const $shuffleBtn = document.getElementById('shuffleBtn');
    const $wrongBtn = document.getElementById('wrongBtn');
    const $progressFill = document.getElementById('progressFill');
    const $progressText = document.getElementById('progressText');

    // 단원 셀렉트
    units.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.code; opt.textContent = u.name;
      $unitSelect.appendChild(opt);
    });
    function unitName(code) { const u = units.find(u => u.code === code); return u ? u.name : code; }

    // 회차 셀렉트 (데이터에 있는 회차들, 내림차순)
    const allRounds = [...new Set(questions.map(q => q.round).filter(r => r))].sort((a, b) => b - a);
    {
      const optAll = document.createElement('option');
      optAll.value = 'all'; optAll.textContent = '전체 회차';
      $roundSelect.appendChild(optAll);
      allRounds.forEach(r => {
        const opt = document.createElement('option');
        opt.value = String(r); opt.textContent = `${r}회`;
        $roundSelect.appendChild(opt);
      });
    }

    // 시드 셔플 (Fisher–Yates)
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // 현재 모드/필터에 맞는 pool 구성
    function buildPool() {
      let base;
      if (mode === 'wrong') {
        base = questions.filter(q => store.answers[q.id] && !store.answers[q.id].correct);
      } else {
        base = [...questions];
        if (roundCode !== 'all') base = base.filter(q => String(q.round) === String(roundCode));
        if (unitCode !== 'all') base = base.filter(q => q.unit === unitCode);
      }
      if (shuffled) {
        base = shuffle(base);
      } else if (roundCode !== 'all') {
        base = [...base].sort((a, b) => a.number - b.number);   // 회차 보기는 번호순
      }
      pool = base;
    }

    function restoreOrStart() {
      // 마지막 위치 복원
      const last = store.last;
      if (last && last.mode) {
        mode = last.mode; unitCode = last.unit || 'all'; roundCode = last.round || 'all'; shuffled = !!last.shuffled;
      }
      $unitSelect.value = unitCode;
      $roundSelect.value = roundCode;
      $shuffleBtn.classList.toggle('active', shuffled);
      $wrongBtn.classList.toggle('active', mode === 'wrong');
      buildPool();
      idx = Math.min(last.idx || 0, Math.max(0, pool.length - 1));
      loadQuestion();
    }

    function loadQuestion() {
      const q = pool[idx];
      if (q && store.answers[q.id]) {
        selected = store.answers[q.id].selected;
        checked = true;
      } else { selected = null; checked = false; }
      persistLast();
      render();
    }

    function persistLast() {
      store.last = { mode, unit: unitCode, round: roundCode, shuffled, idx };
      saveStore();
    }

    // ============================ 렌더 ============================
    function render() {
      $footer.style.display = 'flex';

      if (mode === 'result') return renderResult();

      if (pool.length === 0) {
        const msg = mode === 'wrong' ? '아직 틀린 문제가 없어요. 👍' : '이 단원에는 등록된 문제가 없어요.';
        $content.innerHTML = `<div class="empty">${msg}</div>`;
        $progressText.textContent = '0 / 0';
        $progressFill.style.width = '0%';
        $actionBtn.disabled = true; $prevBtn.disabled = true;
        return;
      }

      const q = pool[idx];
      $progressText.textContent = `${idx + 1} / ${pool.length}`;
      $progressFill.style.width = `${((idx + 1) / pool.length) * 100}%`;

      const roundLabel = q.round ? `${q.round}회 ${q.number}번` : `예시 ${q.number}`;
      const bookmarked = !!store.bookmarks[q.id];
      let html = `
        <div class="meta-row">
          <span class="tag">${unitName(q.unit)}</span>
          <span class="tag gray">${q.level} · ${q.points}점</span>
          <span class="tag gray">${roundLabel}</span>
          ${q.needsImage ? '<span class="tag warn">⚠ 이미지 필요</span>' : ''}
        </div>
        <p class="prompt">${q.prompt}</p>
        ${q.image ? `<img class="q-image" src="${q.image}?v=${IMG_VER}" alt="문제 이미지" />` : ''}
        <ul class="choices">
      `;
      q.choices.forEach((c, i) => {
        let cls = 'choice';
        if (checked) {
          cls += ' locked';
          if (i === q.answer) cls += ' correct';
          else if (i === selected) cls += ' wrong';
        } else if (i === selected) cls += ' selected';
        const numChar = '①②③④⑤'[i] || (i + 1);
        html += `<li><button class="${cls}" data-i="${i}" ${checked ? 'disabled' : ''}>
            <span class="num">${numChar}</span><span>${c}</span></button></li>`;
      });
      html += '</ul>';

      if (checked) {
        const isOk = selected === q.answer;
        html += `
          <div class="explanation">
            <div class="explanation-head ${isOk ? 'ok' : 'no'}">
              <span>${isOk ? '✓ 정답입니다' : '✕ 오답 — 정답: ' + '①②③④⑤'[q.answer]}</span>
              <span style="display:flex;gap:6px">
                <button class="bookmark-btn" id="retryOneBtn">↻ 다시 풀기</button>
                <button class="bookmark-btn" id="bmBtn">${bookmarked ? '★ 저장됨' : '☆ 북마크'}</button>
              </span>
            </div>
            <div class="explanation-body">${q.explanation || '해설이 아직 없습니다.'}</div>
          </div>`;
      }

      $content.innerHTML = html;
      $content.scrollTop = 0;

      $content.querySelectorAll('.choice').forEach(btn => {
        btn.addEventListener('click', () => {
          if (checked) return;
          selected = Number(btn.dataset.i);
          render();
        });
      });
      const bm = document.getElementById('bmBtn');
      if (bm) bm.addEventListener('click', () => {
        if (store.bookmarks[q.id]) delete store.bookmarks[q.id];
        else store.bookmarks[q.id] = true;
        saveStore(); render();
      });
      const retryOne = document.getElementById('retryOneBtn');
      if (retryOne) retryOne.addEventListener('click', () => {
        delete store.answers[q.id];   // 이 문제 채점 기록만 삭제 → 다시 풀 수 있음
        saveStore();
        selected = null; checked = false;
        render();
      });

      updateButtons();
    }

    function updateButtons() {
      $prevBtn.disabled = idx === 0;
      if (!checked) {
        $actionBtn.textContent = '정답 확인';
        $actionBtn.disabled = selected === null;
      } else {
        $actionBtn.textContent = idx === pool.length - 1 ? '결과 보기' : '다음 문제';
        $actionBtn.disabled = false;
      }
    }

    // ============================ 결과 화면 ============================
    function renderResult() {
      $footer.style.display = 'none';
      const answered = pool.filter(q => store.answers[q.id]);
      const correct = answered.filter(q => store.answers[q.id].correct).length;
      const total = pool.length;
      const wrong = answered.length - correct;
      const pct = total ? Math.round((correct / total) * 100) : 0;
      let grade = '조금 더!';
      if (pct >= 90) grade = '🏆 완벽해요!';
      else if (pct >= 70) grade = '👍 합격권이에요!';
      else if (pct >= 50) grade = '💪 거의 다 왔어요';

      $content.innerHTML = `
        <div class="result">
          <h2>풀이 완료</h2>
          <div class="grade">${grade}</div>
          <div class="score-circle">
            <div class="score-num">${pct}<span style="font-size:18px">점</span></div>
            <div class="score-total">${correct} / ${total}</div>
          </div>
          <div class="result-stats">
            <div class="stat"><div class="v ok">${correct}</div><div class="l">맞음</div></div>
            <div class="stat"><div class="v no">${wrong}</div><div class="l">틀림</div></div>
            <div class="stat"><div class="v">${total - answered.length}</div><div class="l">안 풂</div></div>
          </div>
          <div class="result-actions">
            <button class="btn btn-primary" id="reviewWrongBtn">틀린 문제 다시 풀기</button>
            <button class="btn btn-ghost" id="retryBtn" style="flex:none">처음부터 다시</button>
          </div>
        </div>`;
      $progressFill.style.width = '100%';
      $progressText.textContent = `${answered.length} / ${total}`;

      document.getElementById('reviewWrongBtn').addEventListener('click', () => {
        switchMode('wrong');
      });
      document.getElementById('retryBtn').addEventListener('click', () => {
        // 현재 pool 문제들의 풀이 기록 초기화
        pool.forEach(q => delete store.answers[q.id]);
        saveStore();
        mode = 'quiz'; buildPool(); idx = 0; loadQuestion();
      });
    }

    function switchMode(m) {
      mode = m;
      $wrongBtn.classList.toggle('active', mode === 'wrong');
      buildPool(); idx = 0; loadQuestion();
    }

    // ============================ 실전 모의고사 ============================
    const qById = {};
    questions.forEach(q => { qById[q.id] = q; });

    // 실제 한능검 심화 50문항 기준 시대별 출제 분포
    const EXAM_DIST = [
      { units: ['prehistoric', 'gojoseon'], n50: 3 },   // 선사·고조선·여러 나라
      { units: ['ancient', 'north_south'], n50: 8 },     // 고대(삼국·남북국)
      { units: ['goryeo'], n50: 8 },                     // 고려
      { units: ['joseon'], n50: 11 },                    // 조선
      { units: ['modern'], n50: 7 },                     // 근대
      { units: ['colonial'], n50: 7 },                   // 일제 강점기
      { units: ['contemporary'], n50: 5 },               // 현대
      { units: ['culture'], n50: 1 },                    // 통합·문화
    ];
    const UNIT_ORDER = ['prehistoric','gojoseon','ancient','north_south','goryeo',
                        'joseon','modern','colonial','contemporary','culture'];
    const unitRank = {};
    UNIT_ORDER.forEach((u, i) => { unitRank[u] = i; });

    // 실전 분포대로 n문항을 뽑아 시대순으로 정렬
    function buildExamIds(n) {
      let targets = EXAM_DIST.map(g => Math.max(0, Math.round(g.n50 * n / 50)));
      let diff = n - targets.reduce((a, b) => a + b, 0);
      const big = targets.map((t, i) => i).sort((a, b) => targets[b] - targets[a]);
      let k = 0;
      while (diff !== 0) {                 // 반올림 오차를 큰 그룹부터 보정
        const i = big[k % big.length];
        if (diff > 0) { targets[i]++; diff--; }
        else if (targets[i] > 0) { targets[i]--; diff++; }
        k++;
      }
      const picked = [];
      let shortage = 0;
      EXAM_DIST.forEach((g, i) => {
        const groupPool = shuffle(questions.filter(q => g.units.includes(q.unit)).map(q => q.id));
        const take = Math.min(targets[i], groupPool.length);
        picked.push(...groupPool.slice(0, take));
        shortage += targets[i] - take;     // 가용 문항이 모자라면 누적
      });
      if (shortage > 0) {                  // 모자란 만큼 나머지 전체에서 보충
        const rest = shuffle(questions.map(q => q.id).filter(id => !picked.includes(id)));
        picked.push(...rest.slice(0, shortage));
      }
      return picked.sort((a, b) => unitRank[qById[a].unit] - unitRank[qById[b].unit]);
    }

    let examActive = false;       // 모의고사 응시/결과 화면 표시 중
    let exam = null;              // { active, ids, answers:{id:sel}, idx, endTime, durationMin, submitted }
    let examTimer = null;

    const $examBtn = document.getElementById('examBtn');
    const $examSubmitBtn = document.getElementById('examSubmitBtn');

    function saveExam() { store.exam = exam; saveStore(); }
    function stopTimer() { if (examTimer) { clearInterval(examTimer); examTimer = null; } }
    function fmtTime(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }
    function startTimer() {
      stopTimer();
      examTimer = setInterval(tick, 1000);
      tick();
    }
    function tick() {
      if (!exam || exam.submitted) { stopTimer(); return; }
      const rem = exam.endTime - Date.now();
      const el = document.getElementById('examTimer');
      if (rem <= 0) { stopTimer(); submitExam(); return; }
      if (el) { el.textContent = fmtTime(rem); el.classList.toggle('warn', rem <= 60000); }
    }

    // 모의고사 시작 화면
    function openExamStart() {
      examActive = false;
      $footer.style.display = 'none';
      $examSubmitBtn.style.display = 'none';
      $progressText.textContent = '';
      $progressFill.style.width = '0%';
      $content.innerHTML = `
        <div class="result">
          <h2>📝 실전 모의고사</h2>
          <div class="grade">실제 시험처럼 무작위 출제 + 제한시간</div>
          <div class="result-actions">
            <button class="btn btn-primary" data-n="50" data-m="80">50문항 · 80분 <span style="font-weight:400">(실전)</span></button>
            <button class="btn btn-primary" data-n="30" data-m="50">30문항 · 50분</button>
            <button class="btn btn-primary" data-n="20" data-m="30">20문항 · 30분</button>
            <button class="btn btn-ghost" id="examCancel" style="flex:none">취소</button>
          </div>
          <p class="exam-sub" style="margin-top:18px;line-height:1.7">
            실제 한능검과 동일한 <b>시대별 분포</b>로 출제되고
            <b>1번 선사 → 마지막 현대</b> 순으로 정렬됩니다.<br>
            시험 중에는 정답·해설이 보이지 않고, <b>제출 후 채점·예상 등급·해설</b>을
            확인할 수 있어요.<br>창을 닫아도 남은 시간은 계속 흐릅니다.
          </p>
        </div>`;
      $content.querySelectorAll('[data-n]').forEach(b =>
        b.addEventListener('click', () => startExam(Number(b.dataset.n), Number(b.dataset.m))));
      document.getElementById('examCancel').addEventListener('click', leaveExamToPractice);
    }

    function startExam(n, minutes) {
      const ids = buildExamIds(Math.min(n, questions.length));
      exam = { active: true, ids, answers: {}, idx: 0,
               endTime: Date.now() + minutes * 60000, durationMin: minutes, submitted: false };
      examActive = true;
      saveExam();
      startTimer();
      examRender();
    }

    function examRender() {
      if (!exam) return;
      if (exam.submitted) return examResult();
      examActive = true;
      $footer.style.display = 'flex';
      $examSubmitBtn.style.display = 'block';

      const ids = exam.ids;
      const q = qById[ids[exam.idx]];
      const answeredCount = ids.filter(id => exam.answers[id] != null).length;
      $progressText.textContent = `${answeredCount}/${ids.length} 답함`;
      $progressFill.style.width = `${(answeredCount / ids.length) * 100}%`;

      let html = `
        <div class="exam-bar">
          <div>
            <div class="exam-timer" id="examTimer">--:--</div>
            <div class="exam-sub">남은 시간</div>
          </div>
          <div class="exam-sub" style="text-align:right">
            ${exam.idx + 1} / ${ids.length} 문항<br>실전 모의고사
          </div>
        </div>
        <div class="omr">`;
      ids.forEach((id, i) => {
        let c = '';
        if (exam.answers[id] != null) c += ' done';
        if (i === exam.idx) c += ' cur';
        html += `<button class="${c}" data-j="${i}">${i + 1}</button>`;
      });
      html += '</div>';

      const sel = exam.answers[q.id];
      html += `
        <div class="meta-row">
          <span class="tag">${unitName(q.unit)}</span>
          <span class="tag gray">${q.points}점</span>
          <span class="tag gray">${q.round}회 ${q.number}번</span>
        </div>
        <p class="prompt">${q.prompt}</p>
        ${q.image ? `<img class="q-image" src="${q.image}?v=${IMG_VER}" alt="문제 이미지" />` : ''}
        <ul class="choices">`;
      q.choices.forEach((c, i) => {
        const cls = 'choice' + (i === sel ? ' selected' : '');
        html += `<li><button class="${cls}" data-i="${i}">
            <span class="num">${'①②③④⑤'[i]}</span><span>${c}</span></button></li>`;
      });
      html += '</ul>';

      $content.innerHTML = html;
      $content.scrollTop = 0;
      $content.querySelectorAll('.choice').forEach(b =>
        b.addEventListener('click', () => { exam.answers[q.id] = Number(b.dataset.i); saveExam(); examRender(); }));
      $content.querySelectorAll('.omr button').forEach(b =>
        b.addEventListener('click', () => { exam.idx = Number(b.dataset.j); saveExam(); examRender(); }));

      $prevBtn.disabled = exam.idx === 0;
      $actionBtn.disabled = exam.idx === ids.length - 1;
      $actionBtn.textContent = '다음';
      tick();
    }

    function submitExam() {
      if (!exam) return;
      stopTimer();
      exam.submitted = true;
      // 풀이 기록을 공용 저장소에 반영 → 오답노트/북마크와 연동
      exam.ids.forEach(id => {
        const q = qById[id];
        const sel = exam.answers[id];
        if (sel != null) store.answers[id] = { selected: sel, correct: sel === q.answer };
      });
      saveExam();
      examResult();
    }

    function examResult() {
      examActive = true;
      stopTimer();
      $footer.style.display = 'none';
      $examSubmitBtn.style.display = 'none';
      const ids = exam.ids;
      let got = 0, tot = 0, correctN = 0, answeredN = 0;
      ids.forEach(id => {
        const q = qById[id];
        tot += q.points;
        const sel = exam.answers[id];
        if (sel != null) answeredN++;
        if (sel === q.answer) { got += q.points; correctN++; }
      });
      const pct = tot ? Math.round((got / tot) * 100) : 0;
      let grade, cls;
      if (pct >= 80) { grade = '예상 1급'; cls = 'pass'; }
      else if (pct >= 70) { grade = '예상 2급'; cls = 'pass'; }
      else if (pct >= 60) { grade = '예상 3급'; cls = 'pass'; }
      else { grade = '불합격 (60점 미만)'; cls = 'fail'; }

      $progressText.textContent = `${answeredN}/${ids.length}`;
      $progressFill.style.width = '100%';
      $content.innerHTML = `
        <div class="result">
          <h2>채점 결과</h2>
          <div class="grade big ${cls}">${grade}</div>
          <div class="score-circle">
            <div class="score-num">${pct}<span style="font-size:18px">점</span></div>
            <div class="score-total">배점 ${got} / ${tot}점</div>
          </div>
          <div class="result-stats">
            <div class="stat"><div class="v ok">${correctN}</div><div class="l">맞음</div></div>
            <div class="stat"><div class="v no">${answeredN - correctN}</div><div class="l">틀림</div></div>
            <div class="stat"><div class="v">${ids.length - answeredN}</div><div class="l">안 풂</div></div>
          </div>
          <div class="result-actions">
            <button class="btn btn-primary" id="examReviewBtn">문제·해설 다시 보기</button>
            <button class="btn btn-ghost" id="examNewBtn" style="flex:none">새 모의고사</button>
            <button class="btn btn-ghost" id="examExitBtn" style="flex:none">학습 모드로 나가기</button>
          </div>
          <p class="exam-sub" style="margin-top:16px">심화 기준: 80점↑ 1급 · 70점↑ 2급 · 60점↑ 3급<br>틀린 문제는 ★ 오답노트에도 자동 저장됐어요.</p>
        </div>`;
      document.getElementById('examReviewBtn').addEventListener('click', examReview);
      document.getElementById('examNewBtn').addEventListener('click', openExamStart);
      document.getElementById('examExitBtn').addEventListener('click', leaveExamToPractice);
    }

    function examReview() {
      $footer.style.display = 'none';
      $examSubmitBtn.style.display = 'none';
      let html = `<div style="display:flex;gap:8px;margin-bottom:8px">
          <button class="btn btn-ghost" id="reviewBackBtn" style="flex:1">← 결과로</button>
        </div>`;
      exam.ids.forEach((id, n) => {
        const q = qById[id];
        const sel = exam.answers[id];
        const isOk = sel === q.answer;
        html += `<div class="review-item">
          <div class="meta-row">
            <span class="tag gray">${n + 1}번</span>
            <span class="tag">${unitName(q.unit)}</span>
            <span class="tag ${isOk ? '' : 'warn'}">${sel == null ? '미응답' : (isOk ? '정답' : '오답')}</span>
          </div>
          <p class="prompt">${q.prompt}</p>
          ${q.image ? `<img class="q-image" src="${q.image}?v=${IMG_VER}" />` : ''}
          <ul class="choices">`;
        q.choices.forEach((c, i) => {
          let cls = 'choice locked';
          if (i === q.answer) cls += ' correct';
          else if (i === sel) cls += ' wrong';
          html += `<li><button class="${cls}" disabled>
              <span class="num">${'①②③④⑤'[i]}</span><span>${c}</span></button></li>`;
        });
        html += `</ul>
          <div class="explanation"><div class="explanation-body">${q.explanation || ''}</div></div>
        </div>`;
      });
      $content.innerHTML = html;
      $content.scrollTop = 0;
      document.getElementById('reviewBackBtn').addEventListener('click', examResult);
    }

    // 모의고사를 끝내고 학습 모드로 복귀
    function leaveExamToPractice() {
      stopTimer();
      examActive = false;
      exam = null;
      store.exam = null;
      saveStore();
      $examSubmitBtn.style.display = 'none';
      mode = 'quiz';
      $wrongBtn.classList.remove('active');
      buildPool(); idx = 0; loadQuestion();
    }

    // 학습 모드 동작 전, 진행 중 모의고사가 있으면 확인 후 종료
    function guardExam() {
      if (examActive && exam && !exam.submitted) {
        if (!confirm('진행 중인 모의고사를 종료할까요? 기록은 저장되지 않습니다.')) return false;
      }
      stopTimer();
      examActive = false;
      exam = null;
      store.exam = null;
      saveStore();
      $examSubmitBtn.style.display = 'none';
      return true;
    }

    // ============================ 이벤트 ============================
    $actionBtn.addEventListener('click', () => {
      if (examActive) {
        if (exam.idx < exam.ids.length - 1) { exam.idx++; saveExam(); examRender(); }
        return;
      }
      const q = pool[idx];
      if (!checked) {
        checked = true;
        store.answers[q.id] = { selected, correct: selected === q.answer };
        saveStore();
        render();
      } else {
        if (idx === pool.length - 1) { mode = 'result'; render(); }
        else { idx++; loadQuestion(); }
      }
    });
    $prevBtn.addEventListener('click', () => {
      if (examActive) {
        if (exam.idx > 0) { exam.idx--; saveExam(); examRender(); }
        return;
      }
      if (idx > 0) { idx--; loadQuestion(); }
    });
    $examSubmitBtn.addEventListener('click', () => {
      if (!exam || exam.submitted) return;
      const answered = exam.ids.filter(id => exam.answers[id] != null).length;
      const left = exam.ids.length - answered;
      const msg = left > 0 ? `아직 ${left}문항을 풀지 않았어요. 제출할까요?` : '제출하고 채점할까요?';
      if (confirm(msg)) submitExam();
    });
    $examBtn.addEventListener('click', () => {
      if (examActive && exam && !exam.submitted) { examRender(); return; }  // 진행 중이면 이어서
      if (!guardExam()) return;
      openExamStart();
    });

    $unitSelect.addEventListener('change', e => {
      if (!guardExam()) { $unitSelect.value = unitCode; return; }
      unitCode = e.target.value;
      if (mode !== 'quiz') { mode = 'quiz'; $wrongBtn.classList.remove('active'); }
      buildPool(); idx = 0; loadQuestion();
    });
    $roundSelect.addEventListener('change', e => {
      if (!guardExam()) { $roundSelect.value = roundCode; return; }
      roundCode = e.target.value;
      if (mode !== 'quiz') { mode = 'quiz'; $wrongBtn.classList.remove('active'); }
      buildPool(); idx = 0; loadQuestion();
    });
    $shuffleBtn.addEventListener('click', () => {
      if (!guardExam()) return;
      shuffled = !shuffled;
      $shuffleBtn.classList.toggle('active', shuffled);
      buildPool(); idx = 0; loadQuestion();
    });
    $wrongBtn.addEventListener('click', () => {
      if (!guardExam()) return;
      switchMode(mode === 'wrong' ? 'quiz' : 'wrong');
    });
    document.getElementById('homeBtn').addEventListener('click', () => {
      if (!guardExam()) return;
      mode = 'quiz'; buildPool(); idx = 0; loadQuestion();
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
      if (!guardExam()) return;
      if (!confirm('지금까지 푼 채점 기록을 모두 초기화할까요?\n(오답노트도 함께 비워지며, 북마크는 유지됩니다.)')) return;
      store.answers = {};
      saveStore();
      mode = 'quiz';
      $wrongBtn.classList.remove('active');
      buildPool(); idx = 0; loadQuestion();
    });

    // ============================ 이미지 확대 보기 ============================
    const $imgOverlay = document.getElementById('imgOverlay');
    const $ovImg = document.getElementById('ovImg');
    function openOverlay(src) { $ovImg.src = src; $imgOverlay.classList.add('show'); }
    function closeOverlay() { $imgOverlay.classList.remove('show'); $ovImg.src = ''; }
    $content.addEventListener('click', e => {
      const img = e.target.closest('.q-image');
      if (img && img.getAttribute('src')) openOverlay(img.getAttribute('src'));
    });
    $imgOverlay.addEventListener('click', closeOverlay);

    // ============================ 시작 ============================
    if (store.exam && store.exam.active) {
      exam = store.exam;
      examActive = true;
      if (exam.submitted) examResult();
      else if (exam.endTime > Date.now()) { startTimer(); examRender(); }
      else submitExam();   // 자리를 비운 사이 시간 종료 → 자동 채점
    } else {
      restoreOrStart();
    }
  </script>
</body>
</html>
